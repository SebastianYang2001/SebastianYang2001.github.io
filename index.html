<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杨昊澄的主页</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: "Noto Serif SC", serif;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .bg-slider {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }
    .bg-slider img {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: fade 18s infinite;
    }
    .bg-slider img:nth-child(1) { animation-delay: 0s; }
    .bg-slider img:nth-child(2) { animation-delay: 6s; }
    .bg-slider img:nth-child(3) { animation-delay: 12s; }

    @keyframes fade {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      30%  { opacity: 1; }
      40%  { opacity: 0; }
      100% { opacity: 0; }
    }

    header {
      background: rgba(230, 223, 211, 0.85);
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid #ccc;
      position: relative;
    }
    header h1 {
      font-size: 2.8rem;
      margin: 0;
      color: #5c4a3f;
    }
    .language-menu {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .language-menu ul {
      list-style: none;
      margin: 0;
      padding: 0;
      background-color: #eee5d9;
      border: 1px solid #ccc;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .language-menu > ul > li {
      position: relative;
    }
    .language-menu a {
      text-decoration: none;
      color: #3e3229;
      font-weight: bold;
      display: block;
      padding: 0.4rem 1rem;
    }
    .language-menu ul ul {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
    }
    .language-menu li:hover > ul {
      display: block;
    }
    nav {
      background-color: rgba(220, 211, 194, 0.9);
      display: flex;
      justify-content: center;
      padding: 0.5rem;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }
    nav li {
      position: relative;
      margin: 0 1rem;
    }
    nav a {
      text-decoration: none;
      color: #3e3229;
      font-weight: bold;
      padding: 0.5rem;
      display: block;
    }
    nav li:hover ul {
      display: block;
    }
    nav ul ul {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #eee5d9;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    nav ul ul li {
      width: 150px;
    }
    main {
      padding: 2rem;
      font-size: 1.1rem;
      background-color: rgba(255, 255, 255, 0.85);
      margin: 2rem;
      border-radius: 8px;
      flex: 1;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background-color: rgba(230, 223, 211, 0.85);
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
